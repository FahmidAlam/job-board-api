services:
  # FastAPI service
  web:
    build: .                          # Build from Dockerfile in current directory
    ports:
      - "8000:8000"                   # Map port: machine:container
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@host.docker.internal:5432/${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app                        # Mount local files into container (hot reload)

  # PostgreSQL service
  db:
    image: postgres:15                # Use existing PostgreSQL image
    environment:
      POSTGRES_DB: ${DB_NAME}           # Database name from .env
      POSTGRES_USER: ${DB_USER}         # Database user from .env
      POSTGRES_PASSWORD: ${DB_PASSWORD} # Database password from .env
    ports:
      - "5432:5432"                   # Expose PostgreSQL port
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:                       # Named volume for database persistence